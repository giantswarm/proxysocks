serviceType: "managed"
replicaCount: 1

image:
  registry: gsoci.azurecr.io
  name: giantswarm/proxysocks
  tag: ""
  pullPolicy: IfNotPresent

# Authentication configuration
auth:
  enabled: true
  # createSecret renders the users below into a Secret. Set to false and use
  # existingSecret to bring your own Secret (must contain a users.yaml key).
  createSecret: true
  existingSecret: ""
  users:
    - username: "admin"
      password: "changeme"

service:
  type: LoadBalancer
  port: 8000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 100Mi
  limits:
    memory: 200Mi
