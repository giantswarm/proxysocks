apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "labels.selector" . | nindent 6 }}
  template:
    metadata:
      {{- if and .Values.auth.enabled .Values.auth.createSecret }}
      annotations:
        # Roll pods when the managed htpasswd Secret changes. This does not
        # cover auth.existingSecret, whose content the chart cannot see.
        checksum/htpasswd: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
      {{- end }}
      labels:
        {{- include "labels.common" . | nindent 8 }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "labels.selector" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: proxysocks
          image: "{{.Values.image.registry}}/{{.Values.image.name}}:{{ include "image.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            - name: socks5
              containerPort: {{ .Values.service.port }}
          readinessProbe:
            tcpSocket:
              port: socks5
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: socks5
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.auth.enabled }}
          env:
            - name: PROXY_CONFIG_FILE
              value: /etc/proxysocks/htpasswd
          volumeMounts:
            - name: htpasswd
              mountPath: /etc/proxysocks
              readOnly: true
          {{- end }}
      {{- if .Values.auth.enabled }}
      volumes:
        - name: htpasswd
          secret:
            secretName: {{ include "auth.secretName" . }}
      {{- end }}
